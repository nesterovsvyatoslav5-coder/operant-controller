name: operant_controller
description: Контроллер оперантной камеры (режим обучения + эксперимента)
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.4.0
  fluent_ui: ^4.6.0
  go_router: ^13.0.0
  fl_chart: ^0.66.0
  flutter_libserialport: ^0.4.0

  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
